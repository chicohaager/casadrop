<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CasaDrop - Not Found</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📦</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg-body: #F5F6F8;
            --bg-card: #FFFFFF;
            --bg-secondary: #FFFFFF;
            --accent: #2D6A4F;
            --accent-gradient: linear-gradient(135deg, #2D6A4F, #40916C, #52B788);
            --text-primary: #1A1A2E;
            --text-secondary: #4A5568;
            --text-muted: #A0AEC0;
            --border: #E8ECF0;
            --radius: 10px;
            --radius-lg: 20px;
            --shadow: 0 10px 32px rgba(0,0,0,0.08), 0 4px 12px rgba(0,0,0,0.04);
            --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        }

        body {
            font-family: var(--font);
            background: var(--bg-body);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            -webkit-font-smoothing: antialiased;
        }

        .card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 440px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            text-align: center;
            padding: 48px 40px;
        }

        .brand-icon {
            width: 40px;
            height: 40px;
            color: var(--accent);
            margin-bottom: 8px;
        }

        .brand-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 0.5px;
            text-transform: uppercase;
            margin-bottom: 40px;
        }

        .ghost-icon {
            width: 80px;
            height: 80px;
            color: var(--text-muted);
            margin: 0 auto 24px;
            opacity: 0.5;
        }

        .error-code {
            font-size: 64px;
            font-weight: 700;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 12px;
        }

        .error-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .error-desc {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.5;
            margin-bottom: 32px;
        }

        .btn-home {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 28px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text-primary);
            font-family: var(--font);
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
            transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
        }

        .btn-home:hover {
            border-color: #D1D5DB;
            background: #F0F2F5;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        .btn-home svg {
            width: 16px;
            height: 16px;
        }

        @media (max-width: 600px) {
            body { padding: 12px; }
            .card { padding: 36px 24px; }
            .error-code { font-size: 48px; }
        }
    </style>
</head>
<body>
    <div class="card">
        <img src="/static/logo.png" alt="CasaDrop" style="height:100px;width:auto;display:block;margin:0 auto 16px auto;">

        <svg class="ghost-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
            <path d="M13 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V9z"/>
            <polyline points="13 2 13 9 20 9"/>
            <line x1="9" y1="14" x2="15" y2="14" stroke-linecap="round" opacity="0.5"/>
            <circle cx="9.5" cy="11" r="0.5" fill="currentColor" stroke="none"/>
            <circle cx="14.5" cy="11" r="0.5" fill="currentColor" stroke="none"/>
        </svg>

        <div class="error-code">404</div>
        <div class="error-title">Share Not Found</div>
        <div class="error-desc">This share does not exist or has expired.<br>It may have been removed or the link is no longer valid.</div>

        <a href="/" class="btn-home">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            Go to CasaDrop
        </a>
    </div>
</body>
</html>
